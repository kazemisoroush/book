# Feature Flags Configuration Example
#
# Use this file to control which features are enabled/disabled during
# audiobook generation. Save a copy as features.yaml and modify as needed.
#
# To use this config file, pass it to the workflow:
#   python scripts/run_workflow.py --url <url> --config config/features.yaml

features:
  # Ambient Background Sound (US-011)
  # When true, generates ambient audio per scene and mixes it under speech.
  # Requires ElevenLabs API calls. Set to false to save API costs.
  ambient_enabled: true

  # Cinematic Sound Effects (US-023)
  # When true, inserts diegetic sound effects into inter-segment silence gaps.
  # Requires ElevenLabs API calls. Set to false to save API costs.
  cinematic_sfx_enabled: true

  # Emotion Tags (US-009, US-010)
  # When true, uses emotion tags (e.g., "whispers", "laughs") detected by LLM
  # to influence voice synthesis. Set to false to disable emotion rendering.
  emotion_enabled: true

  # Voice Design (US-003, US-014)
  # When true, calls ElevenLabs Voice Design API to create custom voices for
  # characters with detailed descriptions. Falls back to demographic matching
  # if disabled or on API errors. Set to false to save API costs.
  voice_design_enabled: true

  # Scene Context (US-020)
  # When true, applies scene-based voice modifiers (acoustic environment changes)
  # to voice settings. Set to false to disable environment-aware voice adjustments.
  scene_context_enabled: true


# Example: Development Mode (faster, fewer API calls)
# features:
#   ambient_enabled: false
#   cinematic_sfx_enabled: false
#   emotion_enabled: true
#   voice_design_enabled: false
#   scene_context_enabled: true


# Example: Production Mode (all features enabled)
# features:
#   ambient_enabled: true
#   cinematic_sfx_enabled: true
#   emotion_enabled: true
#   voice_design_enabled: true
#   scene_context_enabled: true


# Example: Minimal Cost (core features only)
# features:
#   ambient_enabled: false
#   cinematic_sfx_enabled: false
#   emotion_enabled: true
#   voice_design_enabled: false
#   scene_context_enabled: true
