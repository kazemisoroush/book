          return { pass: true, score: 1, reason: 'All checks passed' };

  # ── mood: close previous, open new ─────────────────────────────
  # Registry holds a grief arc; the passage pivots sharply from mourning
  # to bitter resolve. The parser must close the grief arc and open a
